name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build frontend
        run: cd web/frontend && npm ci && npm run build
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: golangci-lint run

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build frontend
        run: cd web/frontend && npm ci && npm run build
      - run: go test -v -race ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build frontend
        run: cd web/frontend && npm ci && npm run build
      - name: Build binary
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=dev-${GITHUB_SHA::7} -X main.commit=${GITHUB_SHA}" \
            -o light_vm-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/light_vm
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: light_vm-${{ matrix.goos }}-${{ matrix.goarch }}
          path: light_vm-*
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          mkdir -p release
          for dir in artifacts/light_vm-*/; do
            name=$(basename "$dir")
            if echo "$name" | grep -q "windows"; then
              (cd "$dir" && zip "../../release/${name}.zip" *)
            else
              tar -czf "release/${name}.tar.gz" -C "$dir" .
            fi
          done

      - name: Delete existing dev release
        run: gh release delete dev --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        run: |
          gh release create dev \
            --title "Dev Build (${GITHUB_SHA::7})" \
            --notes "Automated build from \`main\` branch.

          **Commit:** ${GITHUB_SHA}" \
            --prerelease \
            --target main \
            release/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
